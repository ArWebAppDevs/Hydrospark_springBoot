
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydrospark - Forget Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        :root {
            --primary-color: #1a1a1a;
            --secondary-color: #ff6b00;
            --accent-color: #ffffff;
            --background-color: #f5f5f5;
            --highlight-color: #00c4b4;
            --error-color: #ff4f4f;
            --shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            --card-bg: #ffffff;
            --text-muted: #666;
            --header-height: 90px;
        }

        /* Header Styles (Unchanged) */
        header {
            background: linear-gradient(135deg, var(--primary-color), #333);
            padding: 20px 40px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
            height: var(--header-height);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: var(--accent-color);
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }

        .logo img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin-right: 10px;
        }

        .home-button {
            background: var(--secondary-color);
            color: var(--accent-color);
            padding: 10px 20px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s;
            border: none;
        }

        .home-button:hover {
            background: #e65c00;
            transform: scale(1.05);
        }

        /* Main Content - No Sidebar */
        .main-content {
            padding-top: calc(var(--header-height) + 30px);
            padding-bottom: 40px;
            padding-left: 20px;
            padding-right: 20px;
            background: var(--background-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Form Container */
        .form-container {
            max-width: 450px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            box-shadow: var(--shadow);
            transition: box-shadow 0.3s ease;
        }

        .form-container:hover {
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
        }

        /* Form Styling */
        .form-container h4 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 25px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(90deg, var(--secondary-color), var(--highlight-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 1.1rem;
            color: var(--primary-color);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input[type="email"],
        .form-group input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            color: var(--primary-color);
            background: #fafafa;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group input[type="email"]:focus,
        .form-group input[type="password"]:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 8px rgba(255, 107, 0, 0.2);
            outline: none;
            background: #fff;
        }

        .form-group input[type="email"]::placeholder,
        .form-group input[type="password"]::placeholder {
            color: #bbb;
        }

        .error-message {
            color: var(--error-color);
            font-size: 1rem;
            padding: 12px;
            background: rgba(255, 79, 79, 0.1);
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-container button {
            padding: 12px 30px;
            background: linear-gradient(90deg, var(--secondary-color), #ff8c00);
            color: var(--accent-color);
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: block;
        }

        .form-container button:hover {
            background: linear-gradient(90deg, #e65c00, #ff6b00);
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255, 107, 0, 0.3);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
            }

            .main-content {
                padding-top: calc(var(--header-height) + 20px);
                padding-left: 15px;
                padding-right: 15px;
            }

            .form-container {
                padding: 20px;
                max-width: 100%;
            }

            .form-container h4 {
                font-size: 1.8rem;
            }

            .form-group input[type="email"],
            .form-group input[type="password"] {
                font-size: 0.95rem;
            }

            .form-container button {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .logo {
                font-size: 1.5rem;
            }

            .logo img {
                width: 40px;
                height: 40px;
            }

            .home-button {
                padding: 8px 15px;
                font-size: 0.9rem;
            }

            .form-container h4 {
                font-size: 1.6rem;
            }

            .form-group label {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<!-- Header (Unchanged) -->
<header>
    <div class="header-container">
        <div class="logo">
            <img th:src="'data:image/png;base64,' + ${session.img}" alt="Hydrospark" />
            <a th:href="@{ / }" style="text-decoration: none; color: white;">
                Hydrospark
            </a>
        </div>
        <a th:href="@{/}" class="home-button">Home</a>
    </div>
</header>

<!-- Main Content - Forget Password Form -->
<div class="main-content">
    <div class="form-container">
        <form method="post" th:action="@{/forgetpassword}">
            <h4>Forget Password</h4>
            <div class="form-group">
                <label for="Email">Email Address</label>
                <input type="email" id="Email" name="Email" required placeholder="Enter email address" />
            </div>
            <div class="form-group">
                <label for="Password">New Password</label>
                <input type="password" id="Password" name="Password" required placeholder="Enter new password" />
            </div>
            <div class="form-group">
                <label for="ConfirmPassword">Confirm Password</label>
                <input type="password" id="ConfirmPassword" name="ConfirmPassword" required placeholder="Confirm new password" />
            </div>
            <div th:if="${error}" class="error-message">
                <p th:text="${error}"></p>
            </div>
            <button type="submit">Reset Password</button>
        </form>
    </div>
</div>
</body>
</html>
