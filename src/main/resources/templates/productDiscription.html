

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hydrospark - Products</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        :root {
            --primary-color: #1a1a1a;
            --secondary-color: #ff6b00;
            --accent-color: #ffffff;
            --background-color: #f5f5f5;
            --highlight-color: #00c4b4;
            --error-color: #ff4f4f;
            --shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            --text-muted: #666;
            --header-height: 90px;
        }

        /* Header Styles */
        header {
            background: linear-gradient(135deg, var(--primary-color), #333);
            padding: 20px 40px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow);
            min-height: var(--header-height);
            display: flex;
            align-items: center;
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            flex-wrap: wrap;
        }

        .logo {
            color: var(--accent-color);
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
        }

        .logo img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin-right: 10px;
        }

        .search-nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-bar {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-bar i {
            position: absolute;
            left: 15px;
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .search-bar input[type="text"] {
            padding: 10px 15px 10px 40px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent-color);
            font-size: 1rem;
            width: 250px;
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }

        .search-bar input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(255, 107, 0, 0.3);
            outline: none;
        }

        .search-bar input[type="text"]::placeholder {
            color: var(--accent-color);
            opacity: 0.7;
        }

        .hamburger {
            background: none;
            border: none;
            color: var(--accent-color);
            font-size: 1.5rem;
            cursor: pointer;
            display: none;
            transition: transform 0.3s ease;
        }

        .hamburger:hover {
            transform: scale(1.1);
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
            transition: all 0.3s ease;
        }

        .nav-btn {
            padding: 8px 20px;
            border: 2px solid var(--secondary-color);
            border-radius: 20px;
            background: transparent;
            color: var(--accent-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
        }

        .nav-btn:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        /* Main Content */
        .main-content {
            padding-top: calc(var(--header-height) + 30px);
            padding-bottom: 40px;
            padding-left: 40px;
            padding-right: 40px;
            background: var(--background-color);
            min-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
        }

        /* Product Container */
        .product-container {
            max-width: 1200px; /* Wider to accommodate two columns */
            width: 100%;
            display: flex;
            flex-direction: row; /* Two columns: images left, details right */
            gap: 40px; /* Space between columns */
        }

        .image-column {
            display: flex;
            flex-direction: column;
            gap: 40px; /* Space between images */
            align-items: flex-start; /* Align images to the left */
        }

        .details-column {
            display: flex;
            flex-direction: column;
            gap: 40px; /* Space between details */
            flex-grow: 1; /* Take remaining space */
        }

        .product-image {
            width: 300px; /* Large image */
            height: 300px;
            flex-shrink: 0;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-details {
            display: flex;
            flex-direction: column;
            min-height: 300px; /* Match image height for alignment */
            justify-content: center; /* Center details vertically with image */
        }

        .product-details h5 {
            color: var(--primary-color);
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .product-details p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .product-details button {
            padding: 12px 25px;
            background: linear-gradient(90deg, var(--secondary-color), #ff8c00);
            color: var(--accent-color);
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: fit-content;
        }

        .product-details button:hover {
            background: linear-gradient(90deg, #e65c00, #ff6b00);
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
        }

        /* Popup Styles */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
        }

        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--accent-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            z-index: 2001;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .popup p {
            color: var(--primary-color);
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .popup p[th\\:if="${session.error}"] {
            color: var(--error-color);
        }

        .popup button {
            padding: 10px 25px;
            background: linear-gradient(90deg, var(--secondary-color), #ff8c00);
            color: var(--accent-color);
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .popup button:hover {
            background: linear-gradient(90deg, #e65c00, #ff6b00);
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(255, 107, 0, 0.3);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                padding: 15px 20px;
                min-height: auto;
            }

            .header-container {
                flex-direction: column;
                padding: 0;
                align-items: flex-start;
            }

            .search-nav {
                flex-direction: column;
                width: 100%;
                margin-top: 10px;
                align-items: flex-start;
            }

            .search-bar {
                width: 100%;
            }

            .search-bar input[type="text"] {
                width: 100%;
                padding: 8px 15px 8px 40px;
                font-size: 0.9rem;
            }

            .hamburger {
                display: block;
                margin-left: auto;
            }

            .nav-buttons {
                display: none;
                flex-direction: column;
                width: 100%;
                gap: 10px;
                margin-top: 10px;
                background: rgba(0, 0, 0, 0.9);
                padding: 15px;
                border-radius: 10px;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                z-index: 999;
            }

            .nav-buttons.active {
                display: flex;
            }

            .nav-btn {
                width: 100%;
                padding: 8px 15px;
                font-size: 0.9rem;
            }

            .main-content {
                padding: 20px;
                padding-top: 120px;
            }

            .product-container {
                flex-direction: column; /* Stack everything vertically on mobile */
                gap: 20px;
            }

            .image-column, .details-column {
                gap: 20px; /* Reduced gap on mobile */
            }

            .product-image {
                width: 100%; /* Full width on mobile */
                height: 250px;
            }

            .product-details {
                min-height: auto; /* Reset height */
                justify-content: flex-start; /* Align to top */
            }

            .product-details h5 {
                font-size: 1.5rem;
            }

            .product-details p {
                font-size: 1rem;
            }

            .product-details button {
                padding: 10px 20px;
                font-size: 1rem;
            }

            .popup {
                width: 85%;
                padding: 15px;
            }

            .popup p {
                font-size: 1rem;
            }

            .popup button {
                padding: 8px 20px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .main-content {
                padding-top: 140px;
            }

            .product-image {
                height: 200px;
            }
        }
    </style>
</head>
<body>
<!-- Header -->
<header>
    <div class="header-container">
        <div class="logo">
            <img th:src="'data:image/png;base64,' + ${session.img}" alt="Hydrospark" />
            <a th:href="@{ / }" style="text-decoration: none; color: white;">
                Hydrospark
            </a>
        </div>
        <div class="search-nav">
            <form class="search-bar" action="/search" method="GET">
                <i class="fas fa-search"></i>
                <input type="text" name="query" placeholder="Search...">
            </form>
            <button class="hamburger" onclick="toggleMenu()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="nav-buttons" th:if="${session.employee != null}">
                <a class="nav-btn" th:href="@{/admin/profile}">Profile</a>
                <a class="nav-btn" th:href="@{/admin/logout}">Logout</a>
            </div>
            <div class="nav-buttons" th:if="${session.employee == null and session.user != null}">
                <a class="nav-btn" th:href="@{/profile}">Profile</a>
                <a class="nav-btn" th:href="@{/logout}">Logout</a>
            </div>
            <div class="nav-buttons" th:if="${session.employee == null and session.user == null}">
                <a class="nav-btn" th:href="@{/signin}">Sign In</a>
                <a class="nav-btn" th:href="@{/signup}">Sign Up</a>
            </div>
        </div>
    </div>
</header>

<!-- Main Content -->
<div class="main-content">
    <div class="product-container">
        <div class="image-column">
            <div th:each="prod : ${product}" class="product-image">
                <img th:src="'data:image/png;base64,' + ${prod.img}" alt="Product Image"/>
            </div>
        </div>
        <div class="details-column">
            <div th:each="prod : ${product}" class="product-details">
                <h5 th:text="${prod.prodName}">Product Name</h5>
                <p th:text="${prod.description}">Dscription</p>
                <p th:text="${prod.price}">Rs.</p>
                <button type="button" onclick="showPopup()">Make an Enquiry</button>
            </div>
        </div>
    </div>

    <!-- Popup -->
    <div class="overlay" id="overlay"></div>
    <div class="popup" id="popup">
        <p th:if="${session.error}" th:text="${session.error}"></p>
        <p th:unless="${session.error}">Enquiry submitted successfully!</p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<script>
    function toggleMenu() {
        const navButtons = document.querySelector('.nav-buttons');
        navButtons.classList.toggle('active');
    }

    function showPopup() {
        const overlay = document.getElementById('overlay');
        const popup = document.getElementById('popup');
        overlay.style.display = 'block';
        popup.style.display = 'block';
    }

    function closePopup() {
        const overlay = document.getElementById('overlay');
        const popup = document.getElementById('popup');
        overlay.style.display = 'none';
        popup.style.display = 'none';
    }
</script>
</body>
</html>
